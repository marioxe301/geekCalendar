name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make
      
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build binary
        run: make VERSION=${{ steps.get_version.outputs.VERSION }}
      
      - name: Verify binary
        run: |
          file gkcal
          ldd gkcal || echo "Static binary - no dynamic dependencies"
          ./gkcal
      
      - name: Create distribution tarball
        run: make dist VERSION=${{ steps.get_version.outputs.VERSION }}
      
      - name: Generate SHA256 checksum
        run: |
          sha256sum gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz > gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz.sha256
          cat gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz.sha256
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz
            gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz.sha256
          body: |
            ## geekCalendar v${{ steps.get_version.outputs.VERSION }}
            
            A lightweight, colorful terminal-based calendar for Linux.
            
            ### Installation
            
            #### Quick Install
            ```bash
            # Download and extract
            wget https://github.com/marioxe301/geekCalendar/releases/download/v${{ steps.get_version.outputs.VERSION }}/gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz
            tar -xzf gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz
            cd gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64
            
            # Install (requires sudo)
            sudo install -m 755 gkcal /usr/local/bin/
            
            # Verify installation
            gkcal
            ```
            
            #### Verify Download Integrity
            ```bash
            sha256sum -c gkcal-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz.sha256
            ```
            
            ### Usage
            
            ```bash
            # Display current month
            gkcal
            
            # Display specific month (0-11) and year
            gkcal 11 2025    # December 2025
            gkcal 0 2026     # January 2026
            ```
            
            ### What's Included
            
            - `gkcal` - Statically linked binary (works on all Linux distributions)
            - `README.md` - Full documentation
            - `LICENSE` - MIT License
            
            ### System Requirements
            
            - Any Linux distribution (Ubuntu, Debian, Fedora, Arch, Alpine, etc.)
            - x86_64 architecture
            - No external dependencies required
            
            ### Changes
            
            See the commit history for details on what's changed in this release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
